<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignment Submission</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1rem;
      color: #1a1a1a;
    }

    .page {
      width: 100%;
      max-width: 560px;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 1.75rem;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.3px;
    }

    .header p {
      font-size: 14px;
      color: #666;
      margin-top: 6px;
      line-height: 1.6;
    }

    /* ── Connected banner ── */
    .connected-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #eaf3de;
      border: 1px solid #c0dd97;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 1.5rem;
      font-size: 13px;
      color: #3b6d11;
      font-weight: 500;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #639922;
      flex-shrink: 0;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border: 1px solid #e5e5e3;
      border-radius: 12px;
      padding: 1.75rem;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 14px;
    }

    /* ── Fields ── */
    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      font-size: 15px;
      padding: 0 12px;
      height: 42px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fafafa;
      color: #111;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }

    input:focus {
      outline: none;
      border-color: #888;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }

    input::placeholder {
      color: #bbb;
    }

    input.error {
      border-color: #e24b4a;
      background: #fff8f8;
    }

    .field-hint {
      font-size: 12px;
      color: #aaa;
      margin-top: 5px;
      line-height: 1.5;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid #f0f0ee;
      margin: 1.5rem 0;
    }

    /* ── Submit button ── */
    .submit-btn {
      width: 100%;
      margin-top: 1.5rem;
      padding: 12px 16px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      letter-spacing: -0.1px;
    }

    .submit-btn:hover { background: #333; }
    .submit-btn:active { background: #000; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Status messages ── */
    .status {
      margin-top: 1rem;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      line-height: 1.5;
    }

    .status.success {
      display: block;
      background: #eaf3de;
      color: #3b6d11;
      border: 1px solid #c0dd97;
    }

    .status.err {
      display: block;
      background: #fcebeb;
      color: #a32d2d;
      border: 1px solid #f7c1c1;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { padding: 1.5rem 0.75rem; }
      .card { padding: 1.25rem; }
    }
  </style>
</head>
<body>

  <div class="page">

    <div class="header">
      <h1>Assignment submission</h1>
      <p>Fill in your details and paste your submission link. Your entry will be saved directly to the Google Sheet.</p>
    </div>

    <div class="connected-banner">
      <div class="dot"></div>
      <span>Connected to Google Sheets</span>
    </div>

    <div class="card">

      <div class="section-label">Student details</div>

      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" placeholder="e.g. Priya Sharma" autocomplete="name" />
      </div>

      <div class="field">
        <label for="student-code">Student code</label>
        <input type="text" id="student-code" placeholder="e.g. STU2024001" autocomplete="off" />
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="e.g. priya@university.edu" autocomplete="email" />
      </div>

      <hr class="divider" />

      <div class="section-label">Submission</div>

      <div class="field">
        <label for="assignment-link">Assignment link</label>
        <input type="url" id="assignment-link" placeholder="https://drive.google.com/..." />
        <p class="field-hint">Paste a shareable link — Google Drive, GitHub, Notion, etc.</p>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitForm()">
        Submit assignment
      </button>

      <div class="status" id="status-box"></div>

    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────
    // CONFIGURATION — edit this section as needed
    // ─────────────────────────────────────────────

    const CONFIG = {
      // Your Google Apps Script Web App URL
      SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbz8z92cy6BKweEQVXrRQUJykF_KDG7DIo7LV_VlCtarXXDh1-qmb_D7jb-c3SK8GFnh5g/exec',

      // Timezone for timestamps (change if needed)
      TIMEZONE: 'Asia/Kolkata',

      // Success message shown after submission
      SUCCESS_MESSAGE: 'Submitted! Your details have been recorded in the sheet.',

      // Error message shown on failure
      ERROR_MESSAGE: 'Something went wrong. Please try again or contact your instructor.',
    };

    // ─────────────────────────────────────────────
    // Form logic — no need to edit below this line
    // ─────────────────────────────────────────────

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function showStatus(type, msg) {
      const box = document.getElementById('status-box');
      box.className = 'status ' + type;
      box.textContent = msg;
    }

    function clearErrors() {
      ['name', 'student-code', 'email', 'assignment-link'].forEach(id => {
        document.getElementById(id).classList.remove('error');
      });
    }

    async function submitForm() {
      clearErrors();

      const name           = document.getElementById('name').value.trim();
      const studentCode    = document.getElementById('student-code').value.trim();
      const email          = document.getElementById('email').value.trim();
      const assignmentLink = document.getElementById('assignment-link').value.trim();

      let hasError = false;
      if (!name)                          { document.getElementById('name').classList.add('error');            hasError = true; }
      if (!studentCode)                   { document.getElementById('student-code').classList.add('error');    hasError = true; }
      if (!email || !validateEmail(email)){ document.getElementById('email').classList.add('error');           hasError = true; }
      if (!assignmentLink)                { document.getElementById('assignment-link').classList.add('error'); hasError = true; }

      if (hasError) {
        showStatus('err', 'Please fill in all fields correctly.');
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Submitting…';

      const payload = {
        name,
        studentCode,
        email,
        assignmentLink,
        timestamp: new Date().toLocaleString('en-IN', { timeZone: CONFIG.TIMEZONE }),
      };

      try {
        await fetch(CONFIG.SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',       // Required for Google Apps Script
          body: JSON.stringify(payload),
        });

        showStatus('success', CONFIG.SUCCESS_MESSAGE);

        // Clear the form
        ['name', 'student-code', 'email', 'assignment-link'].forEach(id => {
          document.getElementById(id).value = '';
        });

      } catch (err) {
        showStatus('err', CONFIG.ERROR_MESSAGE);
        console.error('Submission error:', err);

      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Submit assignment';
      }
    }
  </script>

</body>
</html>
